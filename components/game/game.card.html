<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-body); }
  #root { padding: 22px; }
  .grid { display: grid; grid-template-columns: auto auto 1fr; gap: 26px; align-items: start; }
  .lbl { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .panel { padding: 16px; border-radius: var(--radius-lg); background: var(--game-bg); box-shadow: var(--shadow-sm); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tile, Board, Keyboard } = window.WordlingDesignSystem_ea77b4;
  const g1 = { letters:['c','a','t','t','y'], states:['correct','present','absent','absent','present'] };
  const ls = { c:'correct', a:'present', t:'absent', y:'present', s:'absent' };
  function Demo() {
    return (
      <div className="grid">
        <div>
          <div className="lbl">Tile states</div>
          <div className="panel" data-theme="clean-light" style={{display:'flex',gap:8}}>
            <Tile letter="A" state="correct" size={48}/>
            <Tile letter="B" state="present" size={48}/>
            <Tile letter="C" state="absent" size={48}/>
            <Tile letter="D" state="tbd" size={48}/>
            <Tile letter="" state="empty" size={48}/>
          </div>
        </div>
        <div>
          <div className="lbl">Board · funky</div>
          <div className="panel" data-theme="funky">
            <Board guesses={[g1]} current="sq" rows={4} tileSize={42} rainbow/>
          </div>
        </div>
        <div>
          <div className="lbl">Keyboard · clean light</div>
          <div className="panel" data-theme="clean-light">
            <Keyboard letterStates={ls}/>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
