  body { overscroll-behavior: none; }

    0%, 100% { transform: translateY(0px); }
    50%      { transform: translateY(-6px); }

    0%, 100% { transform: translateY(0) scale(1); }

<body>
<div id="root"></div>

<script type="text/babel">

function TileLogo({ letters, colors, size }) {
  var s = size || 38;
  return (
    <div style={{ display: 'flex', gap: 4 }}>
      {letters.map(function(letter, i) {
        return (
          <div key={i} style={{
            width: s, height: s, borderRadius: Math.round(s * 0.24),
            background: colors[i % colors.length],
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'var(--font-display)', fontWeight: 800,
            fontSize: Math.round(s * 0.5), color: '#fff',
            boxShadow: '0 3px 0 rgba(0,0,0,.15)',
          }}>{letter}</div>
        );
      })}
    </div>
  );
}

function RunnerIcon({ size }) {
  var s = size || 80;
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">
      {/* Simple running figure */}
      <circle cx="44" cy="18" r="8" fill="#F4B942" />
      <path d="M36 30 L44 28 L52 30 L56 44 L48 42 L44 52 L50 66" stroke="#F4B942" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
      <path d="M44 52 L36 64" stroke="#F4B942" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
      <path d="M36 30 L24 40" stroke="#F4B942" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
      <path d="M52 30 L60 24" stroke="#F4B942" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
      {/* Motion lines */}
      <line x1="16" y1="32" x2="10" y2="32" stroke="#F4B942" strokeWidth="2.5" strokeLinecap="round" opacity="0.5" />
      <line x1="18" y1="40" x2="10" y2="40" stroke="#F4B942" strokeWidth="2.5" strokeLinecap="round" opacity="0.35" />
      <line x1="17" y1="48" x2="12" y2="48" stroke="#F4B942" strokeWidth="2.5" strokeLinecap="round" opacity="0.25" />
    </svg>
  );
}

function SnakeIcon({ size }) {
  var s = size || 80;
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">
      {/* Coiling snake body */}
      <path d="M16 62 C 16 46, 40 54, 40 39 C 40 24, 60 31, 60 18" stroke="#8FD3B6" strokeWidth="10" strokeLinecap="round" strokeLinejoin="round" fill="none" />
      <path d="M16 62 C 16 46, 40 54, 40 39 C 40 24, 60 31, 60 18" stroke="#B7E6CF" strokeWidth="4" strokeLinecap="round" fill="none" />
      {/* Head */}
      <circle cx="61" cy="17" r="9" fill="#7BC9A6" />
      <circle cx="57.5" cy="14.5" r="1.8" fill="#2E2A28" />
      <circle cx="64.5" cy="14.5" r="1.8" fill="#2E2A28" />
      {/* Forked tongue */}
      <path d="M61 8 L61 3 M61 3 L59 1 M61 3 L63 1" stroke="#E8755C" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
      {/* Treat */}
      <circle cx="14" cy="65" r="4.5" fill="#F4B942" />
    </svg>
  );
}

function PacklIcon({ size }) {
  var s = size || 80;
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">
      {/* Pac body with a wide wedge mouth opening to the right */}
      <path d="M40 40 L72 23 A35 35 0 1 0 72 57 Z" fill="#F4B942" />
      {/* eye */}
      <circle cx="34" cy="22" r="3.4" fill="#2E2A28" />
      {/* pellets being chomped */}
      <circle cx="64" cy="40" r="3.6" fill="#E8755C" />
      <circle cx="74" cy="40" r="3" fill="#F3A9C8" />
    </svg>
  );
}

function PourlIcon({ size }) {
  var s = size || 80;
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">
      {/* A tilted test tube pouring into an upright one */}
      <g transform="rotate(-32 26 30)">
        {/* tube body */}
        <rect x="18" y="8" width="16" height="40" rx="8" fill="#EDE7DD" stroke="#CFc7b8" strokeWidth="1.5" />
        {/* liquid bands */}
        <rect x="19.5" y="30" width="13" height="16.5" rx="6.5" fill="#56C98A" />
        <rect x="19.5" y="22" width="13" height="9" fill="#4FA3E0" />
        <rect x="19.5" y="15" width="13" height="8" fill="#E8755C" />
      </g>
      {/* upright receiving tube */}
      <rect x="46" y="30" width="17" height="42" rx="8.5" fill="#EDE7DD" stroke="#CFC7B8" strokeWidth="1.5" />
      <rect x="47.5" y="50" width="14" height="20.5" rx="7" fill="#F4B942" />
      <rect x="47.5" y="42" width="14" height="9" fill="#9B6BD6" />
      {/* falling droplet */}
      <circle cx="46" cy="26" r="3.2" fill="#E8755C" />
    </svg>
  );
}

function MemorlIcon({ size }) {
  var s = size || 80;
  // A 3×3 grid with a remembered pattern lit up
  var lit = { 0: '#C7B6E8', 2: '#8FD3B6', 4: '#F4B942', 7: '#E8755C' };
  var cells = [];
  for (var i = 0; i < 9; i++) {
    var col = i % 3, row = Math.floor(i / 3);
    cells.push(
      <rect key={i}
        x={14 + col * 19} y={14 + row * 19}
        width="15" height="15" rx="4"
        fill={lit[i] || '#EAE3D6'} />
    );
  }
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">{cells}</svg>
  );
}

function BrewlIcon({ size }) {
  var s = size || 80;
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">
      {/* coffee cup */}
      <path d="M20 26 H56 V46 a18 18 0 0 1 -18 18 H38 a18 18 0 0 1 -18 -18 Z" fill="#EDE7DD" stroke="#CFC7B8" strokeWidth="2" />
      {/* coffee fill */}
      <path d="M22 40 H54 V46 a16 16 0 0 1 -16 16 H38 a16 16 0 0 1 -16 -16 Z" fill="#9B6B3A" />
      {/* foam line */}
      <rect x="22" y="39" width="32" height="3" rx="1.5" fill="#F4E8D2" />
      {/* target line */}
      <line x1="18" y1="34" x2="58" y2="34" stroke="#56C98A" strokeWidth="2.4" strokeLinecap="round" strokeDasharray="5 4" />
      {/* handle */}

    </svg>
  );
}

function TrainlIcon({ size }) {
  var s = size || 80;
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">
      {/* track splitting into two branches */}
      <path d="M40 8 V34" stroke="#CFC7B8" strokeWidth="6" strokeLinecap="round" />
      <path d="M40 34 L20 70" stroke="#CFC7B8" strokeWidth="6" strokeLinecap="round" />
      <path d="M40 34 L60 70" stroke="#CFC7B8" strokeWidth="6" strokeLinecap="round" />
      {/* active branch highlight (left) */}
      <path d="M40 34 L20 70" stroke="#56C98A" strokeWidth="3" strokeLinecap="round" />
      {/* switch node */}
      <circle cx="40" cy="34" r="6" fill="#2E2A28" />
      <circle cx="40" cy="34" r="2.2" fill="#fff" />
      {/* station depots */}
      <rect x="13" y="68" width="14" height="9" rx="2" fill="#56C98A" />
      <rect x="53" y="68" width="14" height="9" rx="2" fill="#4FA3E0" />
      {/* train on the track */}
      <g transform="rotate(28 40 22)">
        <rect x="33" y="16" width="14" height="9" rx="3" fill="#E8755C" />
        <circle cx="46" cy="20.5" r="1.6" fill="#FFF7D6" />
      </g>

}

function SpaclIcon({ size }) {
  var s = size || 80;
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">
      {/* stars */}
      <circle cx="16" cy="18" r="1.6" fill="#C7B6E8" />
      <circle cx="60" cy="14" r="2" fill="#F4D58D" />
      <circle cx="24" cy="60" r="1.6" fill="#A8D8EA" />
      <circle cx="66" cy="54" r="1.6" fill="#8FD3B6" />
      {/* thruster flame */}
      <path d="M18 40 L8 35 L8 45 Z" fill="#F4B942" />
      {/* ship hull pointing right */}
      <path d="M64 40 L20 22 Q12 40 20 58 Z" fill="#4FA3E0" />
      <path d="M64 40 L20 58 Q34 48 64 40 Z" fill="#2E7CB8" />
      {/* cockpit */}
      <circle cx="30" cy="40" r="7" fill="#EAF6FF" />
      <circle cx="30" cy="40" r="3.4" fill="#2E2A28" />
      {/* laser bolts */}
      <rect x="66" y="38.5" width="9" height="3" rx="1.5" fill="#FFE9A8" />
    </svg>
  );
}

function SliclIcon({ size }) {
  var s = size || 80;
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">
      {/* watermelon sliced in two halves */}
      <g transform="rotate(-18 40 40)">
        {/* left half */}
        <path d="M38 16 A26 26 0 0 0 38 64 Z" fill="#F0577E" />
        <path d="M38 16 A26 26 0 0 0 38 64 Z" fill="none" stroke="#3FA35A" strokeWidth="5" />
        {/* right half, nudged apart */}
        <g transform="translate(8 0)">
          <path d="M42 16 A26 26 0 0 1 42 64 Z" fill="#F0577E" />
          <path d="M42 16 A26 26 0 0 1 42 64 Z" fill="none" stroke="#3FA35A" strokeWidth="5" />
        </g>
        {/* seeds */}
        <circle cx="32" cy="32" r="1.8" fill="#2E2A28" />
        <circle cx="30" cy="44" r="1.8" fill="#2E2A28" />
        <circle cx="54" cy="32" r="1.8" fill="#2E2A28" />
        <circle cx="56" cy="44" r="1.8" fill="#2E2A28" />
      </g>
      {/* blade streak */}
      <path d="M8 22 L72 12" stroke="#EAFBF2" strokeWidth="3" strokeLinecap="round" opacity="0.85" />
    </svg>
  );
}

function RoutlIcon({ size }) {
  var s = size || 80;
  return (
    <svg width={s} height={s} viewBox="0 0 80 80" fill="none">
      {/* dotted planned route */}
      <path d="M20 64 L20 44 L40 44 L40 24 L60 24 L60 14" stroke="#4FA3E0" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="1 7" />
      {/* start dock */}
      <circle cx="20" cy="64" r="5" fill="none" stroke="#5E7A78" strokeWidth="2.5" />
      {/* patrolling pirate ship */}
      <g transform="translate(40 44)">
        <path d="M-6 2 L6 2 L4 7 L-4 7 Z" fill="#3A3550" />
        <path d="M0 2 L0 -7" stroke="#2A2638" strokeWidth="1.6" />
        <path d="M0 -7 L6 -3 L0 -1 Z" fill="#E2483D" />
      </g>
      {/* treasure X */}
      <rect x="53" y="9" width="14" height="9" rx="2" fill="#F4B942" />
      <text x="60" y="11" font-size="11" font-weight="800" fill="#E2483D" text-anchor="middle" font-family="Fredoka, sans-serif">✕</text>
    </svg>
  );
}

function GameCard({ title, subtitle, href, illustration, tileLogo, accentColor, accentBg, delay }) {
  var [hovered, setHovered] = React.useState(false);
  var [pressed, setPressed] = React.useState(false);

  return (
    <a
      href={href}
      onMouseEnter={function() { setHovered(true); }}
      onMouseLeave={function() { setHovered(false); setPressed(false); }}
      onMouseDown={function() { setPressed(true); }}
      onMouseUp={function() { setPressed(false); }}
      style={{
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        textDecoration: 'none', color: 'inherit',
        background: '#fff',
        borderRadius: 24,
        padding: '32px 24px 28px',
        boxShadow: hovered
          ? '0 16px 48px rgba(46,42,40,.16), 0 2px 8px rgba(46,42,40,.08)'
          : '0 6px 24px rgba(46,42,40,.08), 0 1px 4px rgba(46,42,40,.04)',
        border: '2px solid ' + (hovered ? accentColor : 'transparent'),
        cursor: 'pointer',
        transition: 'all 220ms cubic-bezier(.4,0,.2,1)',
        transform: pressed ? 'scale(0.97)' : (hovered ? 'translateY(-4px)' : 'translateY(0)'),
        position: 'relative',
        overflow: 'hidden',
        animation: 'welcome-float 3s ease-in-out ' + delay + 's infinite',
      }}
    >
      {/* Accent glow behind illustration */}
      <div style={{
        position: 'absolute', top: -20, left: '50%', transform: 'translateX(-50%)',
        width: 140, height: 140, borderRadius: '50%',
        background: accentBg,
        filter: 'blur(30px)',
        opacity: hovered ? 0.7 : 0.35,
        transition: 'opacity 300ms ease',
        pointerEvents: 'none',
      }}></div>

      {/* Illustration area */}
      <div style={{
        position: 'relative', zIndex: 1,
        marginBottom: 20,
        animation: hovered ? 'welcome-wobble 0.6s ease-in-out' : 'none',
      }}>
        {illustration}
      </div>

      {/* Tile logo */}
      <div style={{ position: 'relative', zIndex: 1, marginBottom: 14 }}>
        {tileLogo}
      </div>

      {/* Subtitle */}
      <div style={{
        fontFamily: 'var(--font-body)', fontWeight: 600,
        fontSize: 14, color: 'var(--text-muted)',
        textAlign: 'center', position: 'relative', zIndex: 1,
      }}>
        {subtitle}
      </div>

      {/* Play arrow hint */}
      <div style={{
        marginTop: 16,
        width: 40, height: 40, borderRadius: 12,
        background: hovered ? accentColor : 'var(--bg-sunken)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'all 200ms ease',
        position: 'relative', zIndex: 1,
      }}>
        <svg width="16" height="16" viewBox="0 0 16 16" fill={hovered ? '#fff' : 'var(--text-muted)'}>
          <path d="M5 2.5L12.5 8L5 13.5V2.5Z" />
        </svg>
      </div>
    </a>
  );
}
