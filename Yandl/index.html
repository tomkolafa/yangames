<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  button { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; -ms-overflow-style: none; }

  @keyframes yandl-fire {
    0%,100% { transform: scale(1)    rotate(-4deg); filter: brightness(1);    }
    20%     { transform: scale(1.12) rotate( 3deg); filter: brightness(1.18); }
    40%     { transform: scale(1.04) rotate(-2deg); filter: brightness(0.92); }
    60%     { transform: scale(1.14) rotate( 4deg); filter: brightness(1.22); }
    80%     { transform: scale(1.06) rotate(-1deg); filter: brightness(1.05); }
  }
  @keyframes yandl-dance {
    0%   { transform: rotate(0deg)    translateY(0px)   scale(1);    }
    12%  { transform: rotate(-11deg)  translateY(-11px) scale(1.07); }
    25%  { transform: rotate(0deg)    translateY(-2px)  scale(1);    }
    37%  { transform: rotate(11deg)   translateY(-13px) scale(1.07); }
    50%  { transform: rotate(0deg)    translateY(-2px)  scale(1);    }
    62%  { transform: rotate(-7deg)   translateY(-8px)  scale(1.04); }
    75%  { transform: rotate(6deg)    translateY(-5px)  scale(1.03); }
    87%  { transform: rotate(-3deg)   translateY(-2px)  scale(1.01); }
    100% { transform: rotate(0deg)    translateY(0px)   scale(1);    }
  }
</style>
